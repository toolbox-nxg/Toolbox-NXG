name: Feature request
description: Suggest a new feature or improvement for Toolbox-NXG.
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Toolbox-NXG? Great! Please describe it below. It's worth
        checking existing issues and [/r/toolbox_nxg](https://www.reddit.com/r/toolbox_nxg)
        first in case someone is already working on it.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem would this feature solve, or what need does it address?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about.
    validations:
      required: false
