name: Deploy documentation

on:
  push:
    branches: [main]
  # Validate the docs build on PRs too, so a change that breaks TypeDoc or
  # Sphinx is caught before merge rather than failing the post-merge deploy.
  pull_request:
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Sets permissions for the GITHUB_TOKEN to allow GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys (never cancel an in-progress deploy), but let
# superseded PR validation runs cancel each other to save minutes.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Cache the generated TypeDoc markdown, keyed on everything that affects
      # it. On a hit we skip `npm run docs:api` entirely and restore the files
      # with their original mtimes (actions/cache uses tar) -- which is what lets
      # Sphinx's doctree cache below treat the unchanged API pages as unchanged.
      # No restore-keys: a partial restore would leave stale/orphaned pages, so
      # a miss starts from the clean (index.md-only) checkout and regenerates.
      - name: Cache TypeDoc API output
        id: typedoc-cache
        uses: actions/cache@v5
        with:
          path: docs/developer/api
          key: typedoc-${{ runner.os }}-${{ hashFiles('extension/data/**/*.ts', 'extension/data/**/*.tsx', 'typedoc.json', 'tsconfig.json', 'docs/developer/api/index.md', 'package-lock.json') }}

      - name: Generate TypeDoc API reference
        if: steps.typedoc-cache.outputs.cache-hit != 'true'
        run: npm run docs:api

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install Sphinx dependencies
        run: pip install -r docs/requirements.txt

      # Cache the doctree pickles AND the rendered HTML so a re-run only
      # reparses/rewrites pages whose source changed. The cache is scoped by the
      # same TypeDoc source hash as above: when the API surface changes the key
      # prefix changes, nothing is restored, and Sphinx does a clean full build
      # into an empty dir -- so HTML for removed symbols can never accumulate.
      # Within a fixed API surface, restore-keys carries the latest state
      # forward so prose-only commits write just the pages that changed.
      - name: Cache Sphinx build (doctrees + HTML)
        uses: actions/cache@v5
        with:
          path: docs/_build
          key: sphinx-build-${{ runner.os }}-${{ hashFiles('extension/data/**/*.ts', 'extension/data/**/*.tsx', 'typedoc.json', 'tsconfig.json', 'docs/developer/api/index.md', 'package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            sphinx-build-${{ runner.os }}-${{ hashFiles('extension/data/**/*.ts', 'extension/data/**/*.tsx', 'typedoc.json', 'tsconfig.json', 'docs/developer/api/index.md', 'package-lock.json') }}-

      - name: Build Sphinx docs
        # -j auto parallelizes across the runner's vCPUs; -d pins the doctree
        # dir so the cache step above can restore/save it.
        run: sphinx-build -b html -j auto -d docs/_build/.doctrees docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    # PRs only validate the build above; deployment is reserved for main.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
