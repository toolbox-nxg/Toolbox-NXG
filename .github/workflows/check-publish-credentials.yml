name: "Check publish credentials"
# Manual smoke test for the store-publish secrets. Verifies that the Chrome and
# Firefox API credentials are valid WITHOUT uploading or publishing anything, so
# it is safe to run any time. Chrome and Firefox are independent jobs - a failure
# in one tells you exactly which secret set is wrong. Run it from the Actions tab
# (Run workflow) once the secrets are set.
on:
  workflow_dispatch:

jobs:
  check-chrome:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    # A refresh-token grant is the same auth the publish step uses; if Google
    # returns an access token, all three CWS_* secrets are valid. The token is
    # never printed (only its presence is checked).
    - name: Mint a Chrome Web Store access token
      env:
        CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
        REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
      run: |
        if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || [ -z "$REFRESH_TOKEN" ]; then
          echo "::error::One or more CWS_* secrets are not set on this repo."
          exit 1
        fi
        code=$(curl -s -o resp.json -w '%{http_code}' \
          -d "client_id=${CLIENT_ID}" \
          -d "client_secret=${CLIENT_SECRET}" \
          -d "refresh_token=${REFRESH_TOKEN}" \
          -d "grant_type=refresh_token" \
          https://oauth2.googleapis.com/token)
        if [ "$code" = "200" ] && jq -e '.access_token' resp.json >/dev/null; then
          echo "Chrome Web Store credentials OK (access token minted)."
        else
          echo "::error::Chrome credential check failed (HTTP $code)."
          # On failure the response holds {error, error_description} - no token.
          jq -r '"\(.error // "?"): \(.error_description // "?")"' resp.json || cat resp.json
          exit 1
        fi

  check-firefox:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    # AMO uses an HS256 JWT signed with the issuer+secret. Authenticating against
    # the read-only profile endpoint proves the credentials without touching the
    # add-on. The short-lived token is built in Node and never printed.
    - name: Authenticate against the AMO API with a signed JWT
      env:
        JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
        JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
      run: |
        if [ -z "$JWT_ISSUER" ] || [ -z "$JWT_SECRET" ]; then
          echo "::error::AMO_JWT_ISSUER or AMO_JWT_SECRET is not set on this repo."
          exit 1
        fi
        token=$(node -e '
          const crypto = require("crypto")
          const now = Math.floor(Date.now() / 1000)
          const enc = (o) => Buffer.from(JSON.stringify(o)).toString("base64url")
          const head = enc({alg: "HS256", typ: "JWT"})
          const body = enc({iss: process.env.JWT_ISSUER, jti: crypto.randomBytes(8).toString("hex"), iat: now, exp: now + 60})
          const sig = crypto.createHmac("sha256", process.env.JWT_SECRET).update(head + "." + body).digest("base64url")
          process.stdout.write(head + "." + body + "." + sig)
        ')
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -H "Authorization: JWT ${token}" \
          https://addons.mozilla.org/api/v5/accounts/profile/)
        if [ "$code" = "200" ]; then
          echo "AMO credentials OK (authenticated profile fetch)."
        else
          echo "::error::AMO credential check failed (HTTP $code; 401 means a bad issuer/secret)."
          exit 1
        fi
