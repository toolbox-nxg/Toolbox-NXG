name: "Publish to stable listings"
on:
  push:
    tags:
    - "v*"
    - "!v*-*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
    - run: npm ci
    - run: npm run fmt
    - run: npm run lint
    - run: npm run lint:css
    - run: npm run lint:params
    - run: npm run typecheck
    - run: npm test
    - env:
        NODE_ENV: production
        BUILD_TYPE: stable
        BUILD_SHA: ${{ github.sha }}
      run: npm run build

    - name: Zip Chrome build
      run: |
        pushd build/chrome
        zip -r release-build-chrome.zip ./*
        mv release-build-chrome.zip ../..
        popd
    - name: Zip Firefox build
      run: |
        pushd build/firefox
        zip -r release-build-firefox.zip ./*
        mv release-build-firefox.zip ../..
        popd

    - name: Upload release build artifact - Chrome
      uses: actions/upload-artifact@v4
      with:
        name: release-build-chrome
        path: release-build-chrome.zip
    - name: Upload release build artifact - Firefox
      uses: actions/upload-artifact@v4
      with:
        name: release-build-firefox
        path: release-build-firefox.zip

  publish-chrome:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: release-build-chrome
    - uses: wdzeng/chrome-extension@v1
      with:
        extension-id: jhjpjhhkcbkmgdkahnckfboefnkgghpo
        zip-path: release-build-chrome.zip
        client-id: ${{ secrets.CWS_CLIENT_ID }}
        client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
        refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}

  publish-firefox:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: release-build-firefox
    - uses: wdzeng/firefox-addon@v1
      with:
        addon-guid: yes@jetpack
        xpi-path: release-build-firefox.zip
        jwt-issuer: ${{ secrets.AMO_JWT_ISSUER }}
        jwt-secret: ${{ secrets.AMO_JWT_SECRET }}

  publish-github-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
    # Publish the draft release whose tag matches the pushed tag. The release
    # notes are prepared as a draft ahead of time; pushing the tag promotes it.
    - run: gh release edit "${GITHUB_REF#refs/tags/}" --draft=false
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
